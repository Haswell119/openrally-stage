# Spéciale DÉMO (courte) — Rallye du Chablais 2026.
# Ce stage.toml est VOLONTAIREMENT MINIMAL : il n'indique ni CRS, ni route, ni
# camber → ces valeurs sont HÉRITÉES de stages/chablais-2026/rally.toml [defaults].
# Sert à montrer (a) l'héritage des défauts du rallye, (b) le build multi-spéciales.
#
# ⚠️  Waypoints SEED (approximatifs) — remplacez par vos vraies SS depuis le roadbook.

name = "chablais-2026-ss-demo-plaine-evionnaz"
