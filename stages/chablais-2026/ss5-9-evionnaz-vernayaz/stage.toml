# =============================================================================
# Rallye du Chablais 2026 — SS5/9 « Evionnaz–Vernayaz »
# Plaine du Rhône, Valais (VS), Suisse. Spéciale quasi plate (~445–485 m).
#
# Bornes DÉPART/ARRIVÉE = coordonnées RÉELLES fournies par l'utilisateur
# (converties depuis DMS). Le tracé est routé DIRECTEMENT sur le réseau OSM
# entre ces deux points (pas de via forcé).
#
# ⚠️  Si le tracé routé dévie de la vraie spéciale, ajoutez des `via` le long de
#     la route empruntée (usage HUMAIN du roadbook — jamais de scraping).
# =============================================================================

name = "chablais-2026-ss5-9-evionnaz-vernayaz"
title = "Rallye du Chablais 2026 — SS5/9 Evionnaz–Vernayaz"
description = "Recréation de la spéciale Evionnaz–Vernayaz (plaine du Rhône, Valais). Usage simulation personnel."
direction = "Evionnaz → Vernayaz"

# Surface par défaut du parcours ; les segments « terre » ci-dessous surchargent.
default_surface = "tarmac"

# bbox non fournie explicitement → dérivée des waypoints + cette marge (m).
# (clé de niveau racine : doit précéder toute table [..] en TOML)
bbox_margin_m = 400.0

[crs]
geographic = "EPSG:4326"   # waypoints en WGS84 (lat/lon)
work = "EPSG:2056"         # CRS de travail métrique (CH1903+/LV95)

[route]
default_width_m = 6.0      # largeur de route par défaut (m) — à affiner
resample_step_m = 2.0      # pas de rééchantillonnage du tracé (m)
network_filter = "permissive"  # inclut track/unclassified/service (routes mineures)
simplify = true

[camber]
cross_section_width_m = 12.0  # largeur des coupes perpendiculaires (dévers)
n_samples = 21

# --- Waypoints : bornes RÉELLES (DMS → décimal) -----------------------------
# Départ : 46°10'24.2955"N 7°1'17.7772"E
[[waypoints]]
role = "start"
name = "Départ Evionnaz"
lat = 46.173415
lon = 7.021605

# Arrivée : 46°8'37.8039"N 7°2'15.7129"E
[[waypoints]]
role = "end"
name = "Arrivée Vernayaz"
lat = 46.143834
lon = 7.037698

# --- Segments de surface (optionnel) ----------------------------------------
# Aucun segment « terre » défini pour l'instant (spéciale considérée tarmac).
# Pour marquer une portion terre, décommentez et ajustez les distances (m depuis
# le départ) d'après votre roadbook :
# [[surface_overrides]]
# kind = "gravel"
# start_m = 0.0
# end_m = 0.0
# note = "Portion terre — distances à renseigner depuis le roadbook."
