# =============================================================================
# Rallye du Chablais 2026 — SS5/9 « Evionnaz–Vernayaz »
# Plaine du Rhône, Valais (VS), Suisse. Spéciale quasi plate (~445–485 m), ~5,38 km.
#
# Waypoints = points de passage RÉELS fournis par l'utilisateur (roadbook), dans
# l'ordre, convertis depuis DMS. Départ et arrivée sont les bornes exactes ; les
# `via` calent le tracé sur le vrai itinéraire (chicanes + boucle de fin).
# =============================================================================

name = "chablais-2026-ss5-9-evionnaz-vernayaz"
title = "Rallye du Chablais 2026 — SS5/9 Evionnaz–Vernayaz"
description = "Recréation de la spéciale Evionnaz–Vernayaz (plaine du Rhône, Valais). Usage simulation personnel."
direction = "Evionnaz → Vernayaz"

default_surface = "tarmac"

# marge autour des waypoints pour la bbox MNT/OSM
bbox_margin_m = 400.0

[crs]
geographic = "EPSG:4326"   # waypoints en WGS84 (lat/lon)
work = "EPSG:2056"         # CRS de travail métrique (CH1903+/LV95)

[route]
default_width_m = 6.0
resample_step_m = 2.0
network_filter = "permissive"  # inclut track/unclassified/service
simplify = true

[camber]
cross_section_width_m = 12.0
n_samples = 21

